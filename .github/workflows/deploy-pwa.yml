name: Deploy PWA from subfolder

on:
  push:
    branches: ["main"]
    paths: ["pwa-app/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      
      - name: Install dependencies
        run: |
          cd pwa-app
          npm install --legacy-peer-deps
          echo "Dependencies installed successfully"
      
      - name: Build PWA
        run: |
          cd pwa-app
          npm run build
          echo "Build completed successfully"
      
      - name: Verify build output
        run: |
          if [ -d "pwa-app/out" ]; then
            echo "✅ Build output found at pwa-app/out"
            ls -la pwa-app/out
          else
            echo "❌ Build output not found!"
            exit 1
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pwa-app/out
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4