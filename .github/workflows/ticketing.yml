name: Kayako Selenium Scraper

on:
  workflow_dispatch:  # manual trigger
    inputs:
      ticketData:
        description: "Ticket data for scraping"
        required: false
        default: "all"
      mode:
        description: "Run mode"
        required: false
        default: "full"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager beautifulsoup4 lxml html5lib

      - name: Run scraper
        env:
          TICKET_DATA: ${{ github.event.inputs.ticketData }}
          MODE: ${{ github.event.inputs.mode }}
        run: python ticketing.py

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output
          path: output.json