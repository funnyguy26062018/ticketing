name: Sync PWA files from GAS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch files from GAS
        run: |
          BASE_URL="https://script.google.com/macros/s/AKfycbzfiG_GjLQ0WFQZLJcq8fs2yfXKB26p3KGRcMh0HEIb3dYJoqYR662XVqScbEvdzJYb/exec"
          curl -L "$BASE_URL?update=files" -o files.json

      - name: Write files to repo
        run: |
          echo "Starting file sync..."
      
          jq -r 'to_entries | .[] | "\(.key)\u0000\(.value.path)\u0000\(.value.content)"' files.json |
          while IFS=$'\u0000' read -r key path content; do
      
            echo "Writing: $key → $path"
      
            clean_path="${path#/}"
      
            mkdir -p "$(dirname "$clean_path")"
            printf "%s" "$content" > "$clean_path"
      
          done
      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync PWA files from GAS"
          git push
