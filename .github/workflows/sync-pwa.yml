name: Sync PWA files from GAS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch files from GAS
        run: |
          BASE_URL="https://script.google.com/macros/s/AKfycbzfiG_GjLQ0WFQZLJcq8fs2yfXKB26p3KGRcMh0HEIb3dYJoqYR662XVqScbEvdzJYb/exec"
          curl -L "$BASE_URL?update=files" -o files.json

      - name: Debug raw GAS response
        run: cat files.json | head -c 500
        
      # 🔥 Download icons
      - name: Download icons
        run: |
          manifest=$(jq -r '.["manifest.json"].content' files.json)
          echo "$manifest" > manifest.tmp.json

          icon_count=$(jq '.icons | length' manifest.tmp.json)

          for ((i=0; i<icon_count; i++)); do
            url=$(jq -r ".icons[$i].url" manifest.tmp.json)
            src=$(jq -r ".icons[$i].src" manifest.tmp.json)

            if [ "$url" = "null" ] || [ "$src" = "null" ]; then
              continue
            fi

            filename=$(basename "$src")

            echo "Downloading → $filename"
            curl -L "$url" -o "$filename"
          done

      # 🔥 Clean manifest
      - name: Remove url from manifest
        run: |
          jq '."manifest.json".content |= (
            fromjson
            | .icons |= map(del(.url))
            | tojson
          )' files.json > files.cleaned.json

          mv files.cleaned.json files.json

      # 🔥 Write files
      - name: Write files
        run: |
          echo "$(<files.json)" | jq -r 'to_entries[] | @base64' | while read entry; do

            _jq() {
              echo "$entry" | base64 --decode | jq -r "$1"
            }

            path=$(_jq '.value.path')
            content=$(_jq '.value.content')

            if [ -z "$path" ] || [ "$path" = "null" ]; then
              continue
            fi

            clean_path=$(echo "$path" | sed 's|^/||')

            echo "Writing → $clean_path"

            mkdir -p "$(dirname "$clean_path")"
            printf "%s" "$content" > "$clean_path"

          done

      - name: Cleanup
        run: rm -f files.json manifest.tmp.json

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync PWA files from GAS"
          git push
