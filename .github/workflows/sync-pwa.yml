name: Sync PWA files from GAS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch files from GAS
        run: |
          BASE_URL="https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec"
          curl -L "$BASE_URL?update=files" -o files.json

      - name: Write files to repo
        run: |
          jq -c 'to_entries[]' files.json | while read entry; do
            name=$(echo $entry | jq -r '.key')
            path=$(echo $entry | jq -r '.value.path')
            content=$(echo $entry | jq -r '.value.content')

            echo "Writing $path"

            mkdir -p "$(dirname "$clean_path")"
            echo "$content" > "$path"
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync PWA files from GAS"
          git push
