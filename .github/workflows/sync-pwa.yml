name: Sync PWA files from GAS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch files from GAS
        run: |
          BASE_URL="https://script.google.com/macros/s/AKfycbzfiG_GjLQ0WFQZLJcq8fs2yfXKB26p3KGRcMh0HEIb3dYJoqYR662XVqScbEvdzJYb/exec"
          curl -L "$BASE_URL?update=files" -o files.json

      - name: Write files to repo
        run: |
          set -e
      
          echo "Starting file sync..."
          cat files.json
      
          jq -r 'to_entries[] | @base64' files.json | while IFS= read -r entry; do
      
            _jq() {
              echo "$entry" | base64 --decode | jq -r "$1"
            }
      
            key=$(_jq '.key')
            path=$(_jq '.value.path')
            content=$(_jq '.value.content')
      
            echo "Writing: $key → $path"
      
            # safety check
            if [ -z "$path" ] || [ "$path" = "null" ]; then
              echo "ERROR: empty or null path for $key"
              exit 1
            fi
      
            clean_path=$(echo "$path" | sed 's|^/||')
      
            mkdir -p "$(dirname "$clean_path")"
            printf "%s" "$content" > "$clean_path"
      
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync PWA files from GAS"
          git push
