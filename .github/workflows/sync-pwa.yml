name: Sync PWA files from GAS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch files from GAS
        run: |
          BASE_URL="https://script.google.com/macros/s/AKfycbzfiG_GjLQ0WFQZLJcq8fs2yfXKB26p3KGRcMh0HEIb3dYJoqYR662XVqScbEvdzJYb/exec"
          curl -L "$BASE_URL?update=files" -o files.json

      - name: Process manifest & download icons
        run: |
          echo "Processing manifest icons..."
      
          # Extract manifest content
          manifest=$(jq -r '.["manifest.json"].content' files.json)
      
          # Write it temporarily
          echo "$manifest" > manifest.tmp.json
      
          # Extract icons
          icon_count=$(jq '.icons | length' manifest.tmp.json)
      
          mkdir -p ticketing
      
          for ((i=0; i<icon_count; i++)); do
            src=$(jq -r ".icons[$i].src" manifest.tmp.json)
      
            echo "Processing icon: $src"
      
            # Extract Google Drive file ID
            file_id=$(echo "$src" | sed -n 's/.*id=\([^&]*\).*/\1/p')
      
            if [ -z "$file_id" ]; then
              echo "Skipping non-Google-Drive icon"
              continue
            fi
      
            # Determine filename
            size=$(jq -r ".icons[$i].sizes" manifest.tmp.json)
            ext=$(jq -r ".icons[$i].type" manifest.tmp.json | sed 's/image\///')
      
            filename="icon-$size.$ext"
            filename=$(echo "$filename" | sed 's/ /-/g')
      
            echo "Downloading → ticketing/$filename"
      
            curl -L "https://drive.google.com/uc?export=download&id=$file_id" \
              -o "ticketing/$filename"
      
            # Rewrite manifest entry
            jq ".icons[$i].src = \"/ticketing/$filename\"" manifest.tmp.json > tmp.$$.json
            mv tmp.$$.json manifest.tmp.json
          done
      
          # Save updated manifest back into files.json
          updated_manifest=$(cat manifest.tmp.json | jq -c .)
      
          jq ".\"manifest.json\".content = \"$updated_manifest\"" files.json > files.updated.json
      
          mv files.updated.json files.json

      - name: Write files to repo
        run: |
          echo "Starting file sync..."
          
          jq -c 'to_entries[]' files.json | while read -r entry; do
          
            key=$(echo "$entry" | jq -r '.key')
            path=$(echo "$entry" | jq -r '.value.path')
            content=$(echo "$entry" | jq -r '.value.content')
          
            echo "Writing: $key → $path"
          
            if [ -z "$path" ]; then
              echo "ERROR: empty path for $key"
              exit 1
            fi
          
            clean_path="${path#/}"
          
            mkdir -p "$(dirname "$clean_path")"
            printf "%s" "$content" > "$clean_path"
          
          done
      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      
          echo "=== BEFORE ADD ==="
          git status
          
          rm -f files.json
      
          git add -A
      
          echo "=== AFTER ADD ==="
          git status
      
          git commit -m "Sync PWA files from GAS" || echo "No changes to commit"
      
          echo "=== PUSHING ==="
          git push origin HEAD:main
