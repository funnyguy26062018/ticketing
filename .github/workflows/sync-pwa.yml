name: Sync PWA files from GAS
on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Fetch files from GAS
        run: |
          BASE_URL="https://script.google.com/macros/s/AKfycbzfiG_GjLQ0WFQZLJcq8fs2yfXKB26p3KGRcMh0HEIb3dYJoqYR662XVqScbEvdzJYb/exec"
          curl -L "$BASE_URL?update=files" -o files.json
      - name: Debug raw GAS response
        run: cat files.json | head -c 500
      - name: Validate GAS response
        run: |
          if ! jq empty files.json 2>/dev/null; then
            echo "❌ GAS did not return valid JSON. Raw response:"
            cat files.json
            exit 1
          fi
          echo "✅ Valid JSON received"

      # 🔥 Download icons
      - name: Download icons
        run: |
          manifest=$(jq -r '.["manifest"].content' files.json)
          echo "$manifest" > manifest.tmp.json
          icon_count=$(jq '.icons | length' manifest.tmp.json)
          for ((i=0; i<icon_count; i++)); do
            filename=$(jq -r ".icons[$i].src.fileName" manifest.tmp.json)
            b64=$(jq -r ".icons[$i].src.base64" manifest.tmp.json)
            if [ "$filename" = "null" ] || [ "$b64" = "null" ]; then continue; fi
            echo "Writing → $filename"
            echo "$b64" | base64 --decode > "$filename"
          done

      - name: Flatten icon src in manifest
        run: |
          jq '.["manifest"].content |= (
            fromjson
            | .icons |= map(.src = .src.fileName)
            | tojson
          )' files.json > files.cleaned.json
          mv files.cleaned.json files.json

      # 🔥 Extract and write all files via Python
      - name: Write all files
        run: |
          python3 - <<'EOF'
          import json, base64, os

          with open('files.json') as f:
              data = json.load(f)

          print(f"Total keys: {len(data)}")

          for key, entry in data.items():
              path = entry.get('path', '')
              content = entry.get('content', '')
              if not path:
                  continue

              clean_path = path.lstrip('/')

              # Try to parse content as JSON — if it has a base64 field, decode it
              try:
                  inner = json.loads(content)
                  if isinstance(inner, dict) and 'base64' in inner:
                      print(f"Writing (base64) → {clean_path}")
                      os.makedirs(os.path.dirname(clean_path) or '.', exist_ok=True)
                      with open(clean_path, 'wb') as f:
                          f.write(base64.b64decode(inner['base64']))
                      continue
              except (json.JSONDecodeError, TypeError):
                  pass

              # Plain text file
              print(f"Writing → {clean_path}")
              os.makedirs(os.path.dirname(clean_path) or '.', exist_ok=True)
              with open(clean_path, 'w', encoding='utf-8') as f:
                  f.write(content)

          EOF

      - name: Cleanup
        run: rm -f files.json manifest.tmp.json
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Sync PWA files from GAS"
          git push
