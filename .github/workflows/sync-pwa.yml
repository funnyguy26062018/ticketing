name: Sync PWA files from GAS
on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Fetch files from GAS
        run: |
          BASE_URL="https://script.google.com/macros/s/AKfycbzfiG_GjLQ0WFQZLJcq8fs2yfXKB26p3KGRcMh0HEIb3dYJoqYR662XVqScbEvdzJYb/exec"
          curl -L "$BASE_URL?update=files" -o files.json
      - name: Debug raw GAS response
        run: cat files.json | head -c 500
      - name: Validate GAS response
        run: |
          if ! jq empty files.json 2>/dev/null; then
            echo "❌ GAS did not return valid JSON. Raw response:"
            cat files.json
            exit 1
          fi
          echo "✅ Valid JSON received"

      # 🔥 Download icons
      - name: Download icons
        run: |
          manifest=$(jq -r '.["manifest.json"].content' files.json)
          echo "$manifest" > manifest.tmp.json
          icon_count=$(jq '.icons | length' manifest.tmp.json)
          for ((i=0; i<icon_count; i++)); do
            filename=$(jq -r ".icons[$i].src.fileName" manifest.tmp.json)
            b64=$(jq -r ".icons[$i].src.base64" manifest.tmp.json)
            if [ "$filename" = "null" ] || [ "$b64" = "null" ]; then continue; fi
            echo "Writing → $filename"
            echo "$b64" | base64 --decode > "$filename"
          done

      - name: Debug files.json
        run: |
          echo "=== File size ==="
          wc -c files.json
          echo "=== Top-level keys ==="
          python3 -c "import json,sys; d=json.load(open('files.json')); print(list(d.keys()))"
          echo "=== Content lengths per key ==="
          python3 -c "import json,sys; d=json.load(open('files.json')); [print(k, len(str(v.get('content','')))) for k,v in d.items()]"

      - name: Flatten icon src in manifest
        run: |
          jq '.["manifest.json"].content |= (
            fromjson
            | .icons |= map(.src = .src.fileName)
            | tojson
          )' files.json > files.cleaned.json
          mv files.cleaned.json files.json

      - name: Debug files.json size
        run: |
          wc -c files.json
          jq 'keys' files.json

      # 🔥 Extract base64-encoded files (e.g. ticketing.py)
      - name: Extract base64 file entries
        run: |
          jq -r 'keys[]' files.json > /tmp/keys.txt
          while IFS= read -r key; do
            path=$(jq -r --arg k "$key" '.[$k].path' files.json)
            b64=$(jq -r --arg k "$key" '.[$k].content | fromjson | .base64 // empty' files.json 2>/dev/null)
            if [ -z "$b64" ]; then continue; fi
            clean_path=$(echo "$path" | sed 's|^/||')
            echo "Writing (base64) → $clean_path"
            mkdir -p "$(dirname "$clean_path")"
            echo "$b64" | base64 --decode > "$clean_path"
          done < /tmp/keys.txt

      # 🔥 Write remaining text files
      - name: Write files
        run: |
          jq -r 'keys[]' files.json > /tmp/keys.txt
          while IFS= read -r key; do
            path=$(jq -r --arg k "$key" '.[$k].path' files.json)
            if [ -z "$path" ] || [ "$path" = "null" ]; then continue; fi
            b64=$(jq -r --arg k "$key" '.[$k].content | fromjson | .base64 // empty' files.json 2>/dev/null)
            if [ -n "$b64" ]; then continue; fi
            content=$(jq -r --arg k "$key" '.[$k].content' files.json)
            clean_path=$(echo "$path" | sed 's|^/||')
            echo "Writing → $clean_path"
            mkdir -p "$(dirname "$clean_path")"
            printf "%s" "$content" > "$clean_path"
          done < /tmp/keys.txt

      - name: Cleanup
        run: rm -f files.json manifest.tmp.json /tmp/keys.txt
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Sync PWA files from GAS"
          git push
