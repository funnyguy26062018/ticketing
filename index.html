  <body>
    <div class="container-fluid px-0 d-flex flex-column align-items-center">
      <h2 class="mb-4">Active Repairs</h2>
      <div id="ticketList">Loading tickets...</div>
    </div>

    <script>
      // Global variables
      var batchTimer;
      var isRunning = false;
      const timeAfterLastCardButtonPressed = 60; // Time in s
      const timerToCheckProcessStatus = 30 // Time in s
      const urlGAS = "https://script.google.com/macros/s/AKfycbzfiG_GjLQ0WFQZLJcq8fs2yfXKB26p3KGRcMh0HEIb3dYJoqYR662XVqScbEvdzJYb/exec";

      // Loads tickets on startup
      window.onload = function()
      {
        registerSW();
        const dataToSend = {
            "function": "getOpenTicketsHTML"
        };
        const callbacks = {
            onSuccess: renderOpenTickets,
            onFailure: () => console.error("Failed to load tickets")
        };
        sendToGAS(dataToSend, callbacks);
      }
      // Inserts the constructed HTML fragment of the open tickets
      function renderOpenTickets(openTicketsHTML)
      {
        // Displays the HTML ticket list
        const container = document.getElementById("ticketList");
        container.innerHTML = openTicketsHTML;
        restorePendingState();
      }
      // Activated by pressing the card (ticket) button
      function completeTicket(thisButton)
      {
        // Resets on every click
        clearTimeout(batchTimer);
        // Disables the text area in the current card
        const thisTextArea = thisButton.closest(".card").querySelector("textarea");
        thisTextArea.disabled = true;
        // Deactivates the button pressed on the card (ticket)
        thisButton.disabled = true;
        thisButton.innerText = "Syncing...";
        // Starts the timer in ms to wait until the finished tickets will be sent
        batchTimer = setTimeout(() => {
          /* SCRAPES ALL DATABASE IDs OF THE FINISHED TICKETS */
          const listCards = document.getElementById("ticketList");
          // All disabled buttons
          const disabledButtons = listCards.querySelectorAll("button[disabled]");
          // Creates an array from a node list, iterates over the disabled buttons and finds the parent card element to get the (database) ID
          const completedCards = Array.from(disabledButtons).map(button => button.closest(".card"));
          const dataCompletedCards = completedCards.map(card => {
            return {
              "databaseID": card.id,
              "note": card.querySelector("textarea").value
            };
          });
          // Retrieves the just completed tickets as well as the pending ones
          const ticketsToSend = getFromLocalStorage().concat(dataCompletedCards);
          // Fetches all enabled buttons
          const enabledButtons = Array.from(listCards.querySelectorAll("button:not([disabled])"));
          // Disable all enabled buttons
          enabledButtons.forEach(button => button.disabled = true);
          //
          sendToServer(ticketsToSend,enabledButtons);
        }, timeAfterLastCardButtonPressed * 1000);
      }

      // Sends the data to the server
      function sendToServer(ticketsCompleted,disabledButtons)
      {
        if(isRunning)
        {
          sendToServerFailure(ticketsCompleted,disabledButtons);
          return false;
        }
        isRunning = true;
        // Send the data to the backend
        const dataToSend = {
            "function": "markTicketsDone",
            "argument": ticketsCompleted
        };
        const onSuccess = responseCode => {
            if(responseCode === 204)
            {
                pollFromServer(ticketsCompleted,disabledButtons);
            }
            else
            {
                sendToServerFailure(ticketsCompleted,disabledButtons);
            }
        };
        const onFailure = () => {
            sendToServerFailure(ticketsCompleted,disabledButtons);
        };
        const callbacks = {
            "onSuccess": onSuccess,
            "onFailure": onFailure
        };
        sendToGAS(dataToSend,callbacks);
      }

      function sendToServerFailure(ticketsCompleted,disabledButtons)
      {
        saveToLocalStorage(ticketsCompleted);
        // Enable all disabled buttons
        disabledButtons.forEach(button => button.disabled = false);
        isRunning = false;
      }

      function getFromLocalStorage()
      {
        const pendingTickets = JSON.parse(localStorage["pendingTickets"] || "[]");
        delete localStorage["pendingTickets"];
        return pendingTickets;
      }

      function saveToLocalStorage(ticketsCompleted)
      {
        const pendingTickets = JSON.parse(localStorage["pendingTickets"] || "[]");
        localStorage["pendingTickets"] = JSON.stringify(pendingTickets.concat(ticketsCompleted));
      }

      function pollFromServer(ticketsCompleted,disabledButtons)
      {
        const cardIDsCompletedSet = new Set(ticketsCompleted.map(ticket => ticket["databaseID"]));
        // Repeatedly polls the number of tickets and re-enables the buttons on ticket storage success
        const timerResetButtons = setInterval(() => {
            const dataToSend = {
                "function": "getDatabaseIDsConfirmed",
                "argument": Array.from(cardIDsCompletedSet)
            };
            const onSuccess = databaseIDsDone => {
              /* TICKETS STORED IN DATABASE */
              databaseIDsDone.forEach(databaseID => {
                ticketUpdateSuccessful(document.getElementById(databaseID));
                cardIDsCompletedSet.delete(databaseID);
              });
              if(cardIDsCompletedSet.size === 0)
              {
                // Fetches all disabled buttons
                disabledButtons.forEach(button => button.disabled = false);
                clearInterval(timerResetButtons);
                isRunning = false;
              }
            };
            const callbacks = {
                "onSuccess": onSuccess,
                "onFailure": false
            };
            sendToGAS(dataToSend,callbacks);
          }, timerToCheckProcessStatus * 1000);
      }

      async function sendToGAS(dataToSend,callbacks)
      {
        var url = urlGAS;
        var options;
        if(!Object.hasOwn(dataToSend,"argument"))
        {
            const params = new URLSearchParams(dataToSend);
            url = urlGAS + "?" + params;
            options = {
                method: "GET"
            };
        }
        else
        {
            options = {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(dataToSend)   
            };
        }
        try
        {
            const responseJSON = await fetch(url,options);
            const response = await responseJSON.json();
            callbacks["onSuccess"](response);
        }
        catch
        {
            if(callbacks["onFailure"]) callbacks["onFailure"]();
        }
      }

      // Called when the finished tickets are successfully sent
      function ticketUpdateSuccessful(card)
      {
        // Removes the card from the UI
        card.style.transition = "0.5s";
        card.style.opacity = "0";
        setTimeout(() => card.remove(), 500);
      }

      // Listens for online event - auto sync when internet returns
      window.ononline = function()
      {
        sendPendingTickets();
      }
      document.onvisibilitychange = function ()
      {
        if(document.visibilityState === "visible")
        {
          sendPendingTickets();
        }
      }
      // Defaults to localStorage read if called without argument
      function sendPendingTickets(pendingTickets = getFromLocalStorage())
      {
        //const pendingTickets = getFromLocalStorage();
        if(pendingTickets.length === 0) return false;
        const disabledButtons = pendingTickets.map(ticket => {
          const card = document.getElementById(ticket["databaseID"]);
          const button = card?.querySelector("button");
          return button;
        }).filter(Boolean);
        sendToServer(pendingTickets,disabledButtons);
      }

      function restorePendingState()
      {
        const pendingTickets = getFromLocalStorage();
        if(pendingTickets.length === 0) return false;
        pendingTickets.forEach(ticket => {
          const card = document.getElementById(ticket["databaseID"]);
          // The card was already confirmed and removed from backend
          if(!card) return false;
          const textarea = card.querySelector("textarea");
          // Restores the note the user typed
          textarea.value = ticket["note"];
          textarea.disabled = true;
          const button = card.querySelector("button");
          button.innerText = "Syncing...";
          button.disabled = true;
        });
        // Now attempts to sync immediately
        sendPendingTickets(pendingTickets);
      }
      //
      /*function ticketUpdateError(err)
      {
        // 4. Error Handling
        buttonElement.disabled = false;
        buttonElement.innerText = "Error! Try Again";
        alert("Failed to update: " + err.message);
      }*/
     // Register service worker
    async function registerSW()
    {
        if("serviceWorker" in navigator)
        {
            try
            {
                const reg = await navigator.serviceWorker.register('/ticketing/sw.js');
                console.log('✅ Service Worker registered:', reg);
            }
            catch(err)
            {
                console.log('❌ Service Worker failed:', err);
            }
        }
    };
    </script>
