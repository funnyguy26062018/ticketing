<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <link rel="manifest" href="./manifest.json">
    
    <link rel="icon" type="image/png" href="repair-tools.png">
    
    <link rel="apple-touch-icon" href="./repair-tools.png">
    
    <meta name="theme-color" content="#0070f3">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <style>
      html
      {
        font-size: clamp(8px, 1.5vw, 16px);   
      }
      body
      {
        background-color: #f8f9fa;
        padding: 1rem;
      }
      .color-building-group-header
      {
        top: 1vw;  
        z-index: 1020;
        opacity: 0.95;
        -webkit-backdrop-filter: blur(5px);  
        backdrop-filter: blur(5px);  
        width: 90vw;
        box-sizing: border-box;
        margin-left: auto;
        margin-right: auto;
      }
       
      .color-building-27
      {
        background-color: #CD5C5C !important;
        border-left: 6px solid #CD5C5C !important;
      }
      .color-building-31
      {
        background-color: #BA55D3 !important;
        border-left: 6px solid #BA55D3 !important;
      }
      .color-building-39
      {
        background-color: #fb8c00 !important;
        border-left: 6px solid #fb8c00 !important;
      }
       
      .ticket-card
      {
        width: 90vw;           
        max-width: 100%;       
        margin-left: auto;
        margin-right: auto;
        margin-bottom: 1em;
        background-color: #ffffff !important;
        border-top: none;
        border-right: none;
        border-bottom: none;
      }
       
      .ticket-type-watermark
      {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 8rem;
        opacity: 0.06;
        z-index: 0;
        pointer-events: none;
        transition: all 0.5s ease;
      }

      .ticket-card:hover .ticket-type-watermark
      {
        opacity: 0.12;
        transform: translate(-50%, -50%) scale(1.1);
      }

       
      .watermark-electrical
      {
        color: #ff9800;
      }
      .watermark-plumbing
      {
        color: #2196F3;
      }
      .watermark-hvac
      {
        color: #00BCD4;
      }
      .watermark-structural
      {
        color: #795548;
      }
      .watermark-kitchen
      {
        color: #FF6B35;
      }
      .watermark-pest
      {
        color: #8BC34A;
      }
      .watermark-inventory
      {
        color: #9C27B0;
      }
       
       
       
        
        
      
       
       
       
      .ticket-card.flagged
      {
        box-shadow: 0 0 0 2.5px #f59e0b55 !important;
      }
      .btn-flag
      {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0 4px;
        font-size: 1.2rem;
        line-height: 1;
        color: var(--bs-secondary);
        transition: color 0.2s;
      }
      .btn-flag.active
      {
        color: #f59e0b;
      }
       
      
      .toastOptions
      {
        data-bs-animation: true;
        transition-duration: 1.5s;
      }
      body.modal-open
      {
        overflow: hidden;
        padding-right: 0 !important;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid px-0 d-flex flex-column align-items-center">
      <h2 class="mb-4">Active Repairs</h2>
      <div id="ticketList">Loading tickets...</div>
    </div>
    
    <div class="toast-container position-fixed bottom-50 start-50 translate-middle-x">
      <div class="toast text-bg-dark toastOptions" id="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true">
        <div class="toast-header">
          <strong class="me-auto toast-header-text">
            
          </strong>
          
        </div>
        <div class="toast-body toast-body-text">
          
        </div>
      </div>
    </div>
    

    <script>
       
      var batchTimer;
      var sendPendingTicketsIsRunning = false;
      var confirmTicketsIsRunning = false;
      const pollAttemptsMax = 5;
      const timeAfterLastCardButtonPressed = 60; 
      const timerToCheckProcessStatus = 30; 
      const timeToPassBeforeStarredNotesAreSaved = 3; 
      const urlGAS = "https://script.google.com/macros/s/AKfycbzfiG_GjLQ0WFQZLJcq8fs2yfXKB26p3KGRcMh0HEIb3dYJoqYR662XVqScbEvdzJYb/exec";
      
      const toastElement = document.getElementById("toast");
      
      let isToastActive = false;
      
      const toastQueue = [];
      
      const animationsQueue = [];
      let isAnimating = false;


      
      window.onload = async function()
      {
        sendPendingTicketsIsRunning = true;
        registerSW();
        const container = document.getElementById("ticketList");
        const cachedData = await getFromCache();
        var cards = [];
        if(cachedData)
        {
          container.innerHTML = cachedData;
           
          cards = container.querySelectorAll(".card");
          setCardsDisabled(cards,true);
        }
        const dataToSend = {
            "function": "getOpenTicketsHTML"
        };
        const callbacks = {
          "onSuccess": async (openTicketsHTML) => {
            
            container.innerHTML = openTicketsHTML;
            restorePendingState();
            restoreFlaggedState();
            await saveInCache(openTicketsHTML);
            sendPendingTicketsIsRunning = false;
          },
          "onFailure": (error) => {
            console.error("Failed to load tickets");
            console.log(error);
             
            setCardsDisabled(cards,false);
            
            restorePendingState();
            restoreFlaggedState();
            sendPendingTicketsIsRunning = false;
          }
        };
        sendDataToBackend(dataToSend,callbacks);
      }

      
      function setCardsDisabled(cards,state)
      {
        console.log("setCardsDisabled");
        cards.forEach(card => {
          const textarea = card.querySelector("textarea");
          const button = card.querySelector(".btn-success");
          if(textarea) textarea.disabled = state;
          if(button) button.disabled = state;
        });
      }

      
      async function getFromCache()
      {
        try
        {
          const cache = await window.caches.open("v1");
          const cachedCards = await cache.match(new Request("/cards"));
          return cachedCards ? await cachedCards.text(): "";
        }
        catch(error)
        {
          console.log(error.message);
          return false;
        }
      }

      
      async function saveInCache(data)
      {
        try
        {
          const cache = await window.caches.open("v1");
          
          await cache.put(
            new Request("/cards"),
            new Response(data)
          );
        }
        catch(error)
        {
          console.log(error.message);
        }
      }

      
      async function sendDataToBackend(dataToSend,callbacks)
      {
        var url = urlGAS;
  var options;
  if(!Object.hasOwn(dataToSend,"argument"))
  {
    const params = new URLSearchParams(dataToSend);
    url = urlGAS + "?" + params;
    options = {
      method: "GET"
    };
  }
  else
  {
    options = {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded",
      },
      body: new URLSearchParams({payload: JSON.stringify(dataToSend)})  
    };
  }
  try
  {
    const responseJSON = await fetch(url,options);
    const response = await responseJSON.json();
    callbacks["onSuccess"](response);
  }
  catch(error)
  {
    if(callbacks["onFailure"]) callbacks["onFailure"](error);
  }
      }

      
      function completeTicket(thisButton)
      {
        
        clearTimeout(batchTimer);
         
        if(!thisButton) return;
        const thisCard = thisButton.closest(".card");
        if(thisCard)
        {
           
          
          setCardsDisabled([thisCard],true);
          thisButton.innerText = "Syncing ...";
          
          const thisTextArea = thisCard.querySelector("textarea");
          
          const ticketCompleted = {
            "databaseID": thisCard.id,
            "note": thisTextArea.value
          };
          
          saveToLocalStorage("pendingTickets",[ticketCompleted]);
          showToast("text-bg-success", "Success", "The ticket has been saved locally!");
        }
        
        sendPendingTickets();
      }

      
      function onNoteInput()
      {
        clearTimeout(batchTimer);
        batchTimer = setTimeout(() => {
          const thisCard = document.activeElement.closest(".card");
          if(!thisCard) return;
          if(thisCard.classList.contains("flagged"))
          {
            const flaggedTickets = getFromLocalStorage("flaggedTickets");
            const entry = flaggedTickets.find(ticket => ticket["databaseID"] === thisCard.id);
            if(entry)
            {
              entry["note"] = thisCard.querySelector("textarea").value;
              localStorage["flaggedTickets"] = JSON.stringify(flaggedTickets);
            }
          }
        }, timeToPassBeforeStarredNotesAreSaved * 1000);
      }

      
      function sendPendingTickets()
      {
        
        clearTimeout(batchTimer);
        
        batchTimer = setTimeout(() => {
          if(sendPendingTicketsIsRunning) return false;
          const ticketsCompleted = getFromLocalStorage("pendingTickets");
          if(ticketsCompleted.length === 0) return false;
          sendPendingTicketsIsRunning = true;
          showToast("text-bg-success", "Success", "The tickets are about to be sent to the server!");
           
          console.log("sending...");
          debugger;
          
          const startingTime = new Date().getTime();
          
          const dataToSend = {
              "function": "markTicketsDone",
              "argument": ticketsCompleted
          };
          const callbacks = {
            "onSuccess": (responseCode) => {
               
              if(responseCode === 204)
              {
                 
                
                const endingTime = new Date().getTime();
                
                const duration = (endingTime - startingTime) / 1000;
                console.log("time elapsed: ",endingTime-startingTime);
                saveToLocalStorage("ticketsToConfirm",ticketsCompleted);
                removeFromLocalStorage("pendingTickets",ticketsCompleted);
                confirmTickets();
                showToast("text-bg-success", "Success", "The tickets have been sent to the server within " + duration + " seconds!");
              }
              else
              {
                 
                showToast("text-bg-danger", "Failure", "The GitHub server is temporarily unavailable!");
              }
              sendPendingTicketsIsRunning = false;
            },
            "onFailure": (response) => {
              
              showToast("text-bg-danger", "Failure", response.message);
              sendPendingTicketsIsRunning = false;
            }
          };
          sendDataToBackend(dataToSend,callbacks);
        }, timeAfterLastCardButtonPressed * 1000);
      }

      function getFromLocalStorage(storageKey)
      {
        const storedData = JSON.parse(localStorage[storageKey] || "[]");
        
        return storedData;
      }

      function saveToLocalStorage(storageKey,dataToAppend)
      {
        const existingData = JSON.parse(localStorage[storageKey] || "[]");
        localStorage[storageKey] = JSON.stringify(existingData.concat(dataToAppend));
      }

      function removeFromLocalStorage(storageKey,ticketsToRemove)
      {
        const existingData = JSON.parse(localStorage[storageKey] || "[]");
        const databaseIDsToRemove = ticketsToRemove.map(ticketToRemove => ticketToRemove["databaseID"]);
        const databaseIDsToRemoveSet = new Set(databaseIDsToRemove);
        const newData = existingData.filter(ticket => !databaseIDsToRemoveSet.has(ticket["databaseID"]));
        localStorage[storageKey] = JSON.stringify(newData);
      }

      function confirmTickets()
      {
        
        setTimeout(() => {
          if(confirmTicketsIsRunning) return false;
          confirmTicketsIsRunning = true;
          showToast("text-bg-success", "Success", "The polling has started!");
          
          var pollAttempts = 0;
          const timerResetButtons = setInterval(() => {
            const ticketsToConfirm = getFromLocalStorage("ticketsToConfirm");
            if(ticketsToConfirm.length === 0) return false;
            const dataToSend = {
              "function": "getTicketsConfirmed",
              "argument": ticketsToConfirm
            };
            const callbacks = {
              "onSuccess": async (ticketsConfirmed) => {
                 
                pollAttempts++;
                removeFromLocalStorage("ticketsToConfirm",ticketsConfirmed);
                
                removeFromLocalStorage("flaggedTickets",ticketsConfirmed);
                

                
                animateCards(ticketsConfirmed.map(ticket => document.getElementById(ticket["databaseID"])));
                const ticketsToRemove = getFromLocalStorage("ticketsToConfirm");
                if(ticketsToRemove.length === 0)
                {
                   
                  const container = document.getElementById("ticketList");
                  await saveInCache(container.innerHTML);
                  clearInterval(timerResetButtons);
                  showToast("text-bg-success", "Success", "Polling has ended successfully!");
                  confirmTicketsIsRunning = false;
                  return false;
                }
                if(pollAttempts >= pollAttemptsMax)
                {
                   
                  clearInterval(timerResetButtons);
                  showToast("text-bg-danger", "Failure", "Some tickets haven't been confirmed by the time the maximum number of polling attempts is reached!");
                  confirmTicketsIsRunning = false;
                  return false;
                }
              },
              "onFailure": (response) => {
                 
                console.error(response.message);
                showToast("text-bg-danger", "Failure", "Failed to confirm tickets");
                clearInterval(timerResetButtons);
                confirmTicketsIsRunning = false;
              }
            };
            sendDataToBackend(dataToSend,callbacks);
          }, timerToCheckProcessStatus * 1000);
        }, 2 * timerToCheckProcessStatus * 1000);
      }

      
      
      async function animateCards(cards)
      {
        cards.forEach(card => animationsQueue.push(card));
        
        if(isAnimating) return;
        isAnimating = true;
        try
        {
          while(animationsQueue.length > 0)
          {
            await new Promise(resolve => {
              const card = animationsQueue.shift();
              
              if(!card) return resolve();
              const wrapper = document.createElement("div");
              const height = card.getBoundingClientRect().height;
              wrapper.style.overflow = "hidden";
              wrapper.style.height = height + "px";
              wrapper.style.transition = "height 0.55s cubic-bezier(0.4, 0, 0.2, 1)";
              wrapper.style.willChange = "height";
              card.style.willChange = "opacity";
              card.parentNode.insertBefore(wrapper, card);
              wrapper.appendChild(card);
              
              wrapper.getBoundingClientRect();
              
              card.style.transition = "opacity 0.45s ease";
              card.style.opacity = "0";
              setTimeout(() => wrapper.style.height = "0", 120);
              

              const fallback = setTimeout(() => {
                wrapper.remove();
                resolve();
              }, 1000);
              
              wrapper.addEventListener("transitionend", (event) => {
                if(event.propertyName === "height")
                {
                  clearTimeout(fallback);
                  wrapper.remove();
                  resolve();
                }
              }, { once: true });
              
              
              
              
            });
          }
        }
        finally
        {
          isAnimating = false;
        }
      }

      
      window.onoffline = async function()
      {}

      
      window.ononline = function()
      {
        sendPendingTickets();
      }

      
      document.onvisibilitychange = function()
      {
        
        if(document.visibilityState === "visible")
        {
           
          sendPendingTickets();
        }
      }

      
      function restorePendingState()
      {
        
        clearTimeout(batchTimer);
        
        const disableCards = (tickets) => {
          tickets.forEach(ticket => {
            const card = document.getElementById(ticket["databaseID"]);
            
            if(!card) return false;
            const textarea = card.querySelector("textarea");
            
            textarea.value = ticket["note"];
            textarea.disabled = true;
            const button = card.querySelector(".btn-success");
            button.innerText = "Syncing...";
            button.disabled = true;
          });
        }
        const pendingTickets = getFromLocalStorage("pendingTickets");
        const ticketsToConfirm = getFromLocalStorage("ticketsToConfirm");
        disableCards(pendingTickets.concat(ticketsToConfirm));
        if(pendingTickets.length > 0) sendPendingTickets();
        else if(ticketsToConfirm.length > 0) confirmTickets();
      }

      
      function flagTicket(button)
      {
        const isFlagged = button.classList.contains("active");
        const card = button.closest(".card");
        const textArea = card.querySelector("textarea");
        const ticketStarred = {
          "databaseID": card.id,
          "note": textArea.value
        };
        if(isFlagged)
        {
          removeFromLocalStorage("flaggedTickets", [ticketStarred]);
          button.classList.remove("active");
          button.title = "Flag for review";
          card.classList.remove("flagged");
        }
        else
        {
          saveToLocalStorage("flaggedTickets", [ticketStarred]);
          button.classList.add("active");
          button.title = "Remove flag";
          card.classList.add("flagged");
          
          setTimeout(() => moveFlaggedCards([card]), 500);
        }
      }

      function moveFlaggedCards(cards)
      {
        const container = document.getElementById("ticketList");
        const groupHeader = container.querySelector(".color-building-group-header");
        
        const allElements = Array.from(container.querySelectorAll(".card, .color-building-group-header"));
        const firstRects = new Map();
        allElements.forEach(element => firstRects.set(element, element.getBoundingClientRect()));
        
        cards.forEach(card => container.insertBefore(card, groupHeader));
        
        allElements.forEach(element => {
          const first = firstRects.get(element);
          const last = element.getBoundingClientRect();
          const deltaY = first.top - last.top;
          if(Math.abs(deltaY) < 1) return;
          element.style.transition = "none";
          element.style.transform = "translateY(" + deltaY + "px)";
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              element.style.transition = "transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)";
              element.style.transform = "translateY(0)";
            });
          });
        });
      }

      function restoreFlaggedState()
      {
        const flaggedTickets = getFromLocalStorage("flaggedTickets");
        const container = document.getElementById("ticketList");
        const groupHeader = container.querySelector(".color-building-group-header");
        flaggedTickets.forEach(ticket => {
          const card = document.getElementById(ticket["databaseID"]);
          if(!card) return;
          card.classList.add("flagged");
          card.querySelector("textarea").value = ticket["note"];
          const button = card.querySelector(".btn-flag");
          if(!button) return;
          button.classList.add("active");
          button.title = "Remove flag";
          container.insertBefore(card, groupHeader);
        });
      }

      
      function showToast(classToAdd,textHeader,textBody)
      {
        
        const toast = bootstrap.Toast.getOrCreateInstance(toastElement);
        if(!isToastActive)
        {
          isToastActive = true;
          
          const toastHeader = toastElement.querySelector(".toast-header");
          const colorClasses = ["text-bg-primary", "text-bg-success", "text-bg-danger", "text-bg-warning", "text-bg-info"];
          toastHeader.classList.remove(...colorClasses);
          
          toastHeader.classList.add(classToAdd);
          
          toastElement.querySelector(".toast-header-text").textContent = textHeader;
          toastElement.querySelector(".toast-body-text").textContent = textBody;
          
          toastElement.addEventListener("hidden.bs.toast", onToastHidden, {once: true});
          toast.show();
        }
        else
        {
          
          toastQueue.push({classToAdd,textHeader,textBody});
        }
        return toast;
      }

      
      function onToastHidden()
      {
        isToastActive = false;
        
        if(toastQueue.length > 0)
        {
          const nextToast = toastQueue.shift();
          showToast(nextToast.classToAdd, nextToast.textHeader, nextToast.textBody);
        }
      }

      
      async function registerSW()
      {
        if("serviceWorker" in navigator)
        {
          try
          {
            const reg = await navigator.serviceWorker.register("./sw.js");
            console.log('✅ Service Worker registered:', reg);
          }
          catch(err)
          {
            console.log('❌ Service Worker failed:', err);
          }
        }
      };
    </script>
  </body>
</html>
