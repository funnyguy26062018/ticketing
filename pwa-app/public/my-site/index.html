<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="manifest" href="/ticketing/manifest.json">
    <meta name="theme-color" content="#0070f3">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
      html
      {
        font-size: clamp(8px, 1.5vw, 16px);  /* ← drives everything on the page */
      }
      body
      {
        background-color: #f8f9fa;
        padding: 1rem;
      }
      .color-building-group-header
      {
        top: 1vw; /* Distance from the top of the phone screen */
        z-index: 1020;
        opacity: 0.95;
        backdrop-filter: blur(5px); /* Modern glass effect */
        width: 90vw;
        box-sizing: border-box;
        margin-left: auto;
        margin-right: auto;
      }
      /* Border color and group header color */
      .color-building-27
      {
        background-color: #CD5C5C !important;
        border-left: 6px solid #CD5C5C !important;
      }
      .color-building-31
      {
        background-color: #BA55D3 !important;
        border-left: 6px solid #BA55D3 !important;
      }
      .color-building-39
      {
        background-color: #fb8c00 !important;
        border-left: 6px solid #fb8c00 !important;
      }
      /* Global Color Card Reset */
      .ticket-card
      {
        width: 90vw;          /* always 90% of screen width */
        max-width: 100%;      /* still won't overflow on very small screens */
        margin-left: auto;
        margin-right: auto;
        margin-bottom: 1em;
        background-color: #ffffff !important;
        border-top: none;
        border-right: none;
        border-bottom: none;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid px-0 d-flex flex-column align-items-center">
      <h2 class="mb-4">Active Repairs</h2>
      <div id="ticketList">Loading tickets...</div>
    </div>

    <script>
      // Global variables
      var batchTimer;
      const timeAfterLastCardButtonPressed = 60; // Time in s
      const timerToCheckProcessStatus = 30 // Time in s
      // Loads tickets on startup
      window.onload = async function()
      {
        //google.script.run.withSuccessHandler(renderOpenTickets).getOpenTicketsHTML();
        const urlGAS = "https://script.google.com/macros/s/AKfycbzfiG_GjLQ0WFQZLJcq8fs2yfXKB26p3KGRcMh0HEIb3dYJoqYR662XVqScbEvdzJYb/exec";
        const parameters = "function=getOpenTicketsHTML";
        debugger;
        console.log("hier");
        const response = await fetch(urlGAS + "?" + parameters);
        const res = await response.json();
        console.log(res);
        renderOpenTickets(res);
      }
       // Add a manual initialization function that Next.js can call
        window.initPage = function() {
            console.log('initPage called manually');
            // Trigger the same logic as window.onload
            if (typeof window.onload === 'function') {
            window.onload();
            }
        }
      // Inserts the constructed HTML fragment of the open tickets
      function renderOpenTickets(openTicketsHTML)
      {
        // Displays the HTML ticket list
        const container = document.getElementById("ticketList");
        container.innerHTML = openTicketsHTML
      }
      // Activated by pressing the card (ticket) button
      function completeTicket(thisButton)
      {
        // Resets on every click
        clearTimeout(batchTimer);
        // Disables the text area in the current card
        const thisTextArea = thisButton.closest(".card").querySelector("textarea");
        thisTextArea.disabled = true;
        // Deactivates the button pressed on the card (ticket)
        thisButton.disabled = true;
        thisButton.innerText = "Syncing...";
        // Starts the timer in ms to wait until the finished tickets will be sent
        batchTimer = setTimeout(() => {
          /* SCRAPES ALL DATABASE IDs OF THE FINISHED TICKETS */
          const listCards = document.getElementById("ticketList");
          // All disabled buttons
          const disabledButtons = listCards.querySelectorAll("button[disabled]");
          // Creates an array from a node list, iterates over the disabled buttons and finds the parent card element to get the (database) ID
          const completedCards = Array.from(disabledButtons).map(button => button.closest(".card"));
          const dataCompletedCards = completedCards.map(card => {
            return {
              "databaseID": card.id,
              "note": card.querySelector("textarea").value
            };
          });
          // Fetches all enabled buttons
          const enabledButtons = Array.from(listCards.querySelectorAll("button:not([disabled])"));
          // Disable all enabled buttons
          enabledButtons.forEach(button => button.disabled = true);
          // Send the data to the backend
          google.script.run.withSuccessHandler(responseCode => {
            if(responseCode !== 204)
            {
              // Enable all disabled buttons
              enabledButtons.forEach(button => button.disabled = false);
              return false;
            }
            pollFromServer(completedCards,enabledButtons);
          }).markTicketsDone(dataCompletedCards);
        }, timeAfterLastCardButtonPressed * 1000);
      }

      function pollFromServer(completedCards,disabledButtons)
      {
        const cardIDsCompletedSet = new Set(completedCards.map(card => card.id));
        // Repeatedly polls the number of tickets and re-enables the buttons on ticket storage success
        const timerResetButtons = setInterval(() => {
            google.script.run.withSuccessHandler(databaseIDsDone => {
              /* TICKETS STORED IN DATABASE */
              databaseIDsDone.forEach(databaseID => {
                ticketUpdateSuccessful(document.getElementById(databaseID));
                cardIDsCompletedSet.delete(databaseID);
              });
              if(cardIDsCompletedSet.size === 0)
              {
                // Fetches all disabled buttons
                disabledButtons.forEach(button => button.disabled = false);
                clearInterval(timerResetButtons);
              }
            }).getDatabaseIDsConfirmed(Array.from(cardIDsCompletedSet));
          }, timerToCheckProcessStatus * 1000);
      }

      // Called when the finished tickets are successfully sent
      function ticketUpdateSuccessful(card)
      {
        // Removes the card from the UI
        card.style.transition = "0.5s";
        card.style.opacity = "0";
        setTimeout(() => card.remove(), 500);
      }
      //
      /*function ticketUpdateError(err)
      {
        // 4. Error Handling
        buttonElement.disabled = false;
        buttonElement.innerText = "Error! Try Again";
        alert("Failed to update: " + err.message);
      }*/
    </script>
    <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('✅ Service Worker registered:', reg))
        .catch(err => console.log('❌ Service Worker failed:', err));
    }

    // Handle install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('✅ App can be installed');
        
        // Create and show install button
        const installBtn = document.createElement('button');
        installBtn.textContent = '📱 Install App';
        installBtn.style.position = 'fixed';
        installBtn.style.bottom = '20px';
        installBtn.style.right = '20px';
        installBtn.style.padding = '12px 24px';
        installBtn.style.background = '#0070f3';
        installBtn.style.color = 'white';
        installBtn.style.border = 'none';
        installBtn.style.borderRadius = '8px';
        installBtn.style.cursor = 'pointer';
        installBtn.style.zIndex = '1000';
        installBtn.style.fontSize = '16px';
        
        installBtn.onclick = () => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choice => {
            if (choice.outcome === 'accepted') {
            console.log('User accepted install');
            }
            installBtn.remove();
            deferredPrompt = null;
        });
        };
        
        document.body.appendChild(installBtn);
    });
    </script>
  </body>
</html>
